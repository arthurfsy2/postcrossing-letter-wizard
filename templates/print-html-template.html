<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postcrossing Postcards - {{date}}</title>
  <style>
    @page { 
      size: A4; 
      margin: 2cm; 
    }
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 210mm;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
    }
    .postcard {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 20px 0;
      page-break-inside: avoid;
      background: #fff;
    }
    .postcard h2 {
      margin-top: 0;
      color: #34495e;
      font-size: 18px;
    }
    .postcard pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 4px;
    }
    .handwritten-recommended {
      border: 3px solid #ff6b6b;
      background: #fff5f5;
    }
    .handwritten-mark {
      display: inline-block;
      background: #ff6b6b;
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .handwritten-mark::before {
      content: "🖐️ ";
    }
    .cut-line {
      border-top: 3px dashed #999;
      margin: 30px 0;
      position: relative;
    }
    .cut-line::after {
      content: "✂️ 沿虚线剪下";
      position: absolute;
      top: -12px;
      right: 20px;
      background: white;
      padding: 0 10px;
      color: #666;
      font-size: 12px;
    }
    .metadata {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    @media print {
      body {
        padding: 0;
      }
      .cut-line::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <h1>Postcrossing Postcards - {{date}}</h1>
  
  {{#postcards}}
  <div class="postcard {{handwrittenClass}}">
    {{#handwritten}}
    <div class="handwritten-mark">建议手写</div>
    {{/handwritten}}
    
    <h2>To: {{name}} ({{country}})</h2>
    <pre>{{content}}</pre>
    
    <div class="metadata">
      <strong>Postcard ID:</strong> {{id}} | 
      <strong>Distance:</strong> {{distance}} km |
      <strong>Sent:</strong> {{sent}} | 
      <strong>Received:</strong> {{received}}
    </div>
  </div>
  
  {{#unless last}}
  <div class="cut-line"></div>
  {{/unless}}
  
  {{/postcards}}
  
  <script>
    // 打印提示
    console.log('💡 Tip: Use Ctrl+P (Cmd+P on Mac) to print this page on A4 paper.');
  </script>
</body>
</html>
